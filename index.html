<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Erika 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(120deg, #1a2a6c, #b21f1f, #fdbb2d);
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 {
    margin-top: 20%;
    font-size: 35px;
}

h2 {
    font-size: 25px;
}

p {
    font-size: 18px;
}

/* corazones */
.heart {
    position: absolute;
    color: pink;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<h1>Para la mujer de mi vida 💖</h1>
<h2>Erika Yasmin Cadalso</h2>
<p>Te amo muchísimo, eres lo mejor que me ha pasado 💕</p>

<!-- Música -->
<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
// corazones animados
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}, 300);
</script>

</body>
</html>
